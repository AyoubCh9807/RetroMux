<script>
    const SERVER_URL = 'http://localhost:8080/negotiate';
    const statusDiv = document.getElementById('status');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Allocation metrics for Gambatte emulator output frame structure (RGB565 or XRGB8888 conversion payload)
    const imgData = ctx.createImageData(160, 144);

    // Libretro Device Button ID Constants
    const RETRO_DEVICE_ID_JOYPAD_B = 0;
    const RETRO_DEVICE_ID_JOYPAD_A = 1;
    const RETRO_DEVICE_ID_JOYPAD_SELECT = 2;
    const RETRO_DEVICE_ID_JOYPAD_START = 3;
    const RETRO_DEVICE_ID_JOYPAD_UP = 4;
    const RETRO_DEVICE_ID_JOYPAD_DOWN = 5;
    const RETRO_DEVICE_ID_JOYPAD_LEFT = 6;
    const RETRO_DEVICE_ID_JOYPAD_RIGHT = 7;

    // JavaScript Keyboard to Libretro Mapping
    const keyMap = {
        'ArrowUp':    RETRO_DEVICE_ID_JOYPAD_UP,
        'ArrowDown':  RETRO_DEVICE_ID_JOYPAD_DOWN,
        'ArrowLeft':  RETRO_DEVICE_ID_JOYPAD_LEFT,
        'ArrowRight': RETRO_DEVICE_ID_JOYPAD_RIGHT,
        'z':          RETRO_DEVICE_ID_JOYPAD_A,
        'Z':          RETRO_DEVICE_ID_JOYPAD_A,
        'x':          RETRO_DEVICE_ID_JOYPAD_B,
        'X':          RETRO_DEVICE_ID_JOYPAD_B,
        'Enter':      RETRO_DEVICE_ID_JOYPAD_START,
        'Shift':      RETRO_DEVICE_ID_JOYPAD_SELECT
    };

    let pc = null;
    let dataChannel = null;

    async function initializeWebRTC() {
        statusDiv.innerText = "Status: Connecting...";
        
        // 1. Instantiating WebRTC Local Peer Pipeline
        pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });

        // 2. Set up the dynamic data channel hook
        pc.ondatachannel = (event) => {
            dataChannel = event.channel;
            setupDataChannelHandlers(dataChannel);
        };

        // Fallback for explicitly handling connection initialization structures
        const localChannel = pc.createDataChannel("retro_mux_stream");
        setupDataChannelHandlers(localChannel);

        // 3. Generate SDP Offer
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        // Wait completely for local ICE gathering to eliminate client-side asynchronous connection drops
        await new Promise((resolve) => {
            if (pc.iceGatheringState === 'complete') {
                resolve();
            } else {
                function checkState() {
                    if (pc.iceGatheringState === 'complete') {
                        pc.removeEventListener('icegatheringstatechange', checkState);
                        resolve();
                    }
                }
                pc.addEventListener('icegatheringstatechange', checkState);
            }
        });

        // 4. Dispatch Offer to Drogon C++ Server via standard POST
        try {
            const response = await fetch(SERVER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: pc.localDescription.sdp
            });

            if (!response.ok) throw new Error("Server rejected our negotiation offer token.");

            const serverSdpAnswer = await response.text();
            
            // 5. Connect peer pipeline with remote answer
            await pc.setRemoteDescription(new RTCSessionDescription({
                type: 'answer',
                sdp: serverSdpAnswer
            }));

        } catch (err) {
            statusDiv.innerText = "Status: Connection Failed";
            console.error("Negotiation engine exception: ", err);
        }
    }

    function setupDataChannelHandlers(channel) {
        channel.binaryType = 'arraybuffer';

        channel.onopen = () => {
            statusDiv.innerText = "Status: Connected";
            statusDiv.className = "connected";
            console.log("WebRTC channel opened with RetroMux backend core engine.");
        };

        channel.onclose = () => {
            statusDiv.innerText = "Status: Disconnected";
            statusDiv.className = "";
            console.warn("WebRTC channel disconnected.");
        };

        // 6. RENDER FLOW: Processing incoming stream packets
        channel.onmessage = (event) => {
            const buffer = event.data;
            const uint8View = new Uint8Array(buffer);
            const totalBytes = uint8View.length;

            // Target dimensions: 160x144 pixels. 
            // Gambatte core usually defaults to RGB565 (2 bytes) or XRGB8888 (4 bytes)
            const pixelsCount = 160 * 144;
            const bytesPerPixel = totalBytes / pixelsCount;

            let outIdx = 0;

            if (bytesPerPixel === 2) {
                // Handling 16-bit RGB565 parsing loops
                for (let i = 0; i < totalBytes; i += 2) {
                    const b1 = uint8View[i];
                    const b2 = uint8View[i + 1];
                    const val = (b2 << 8) | b1; // Little endian check

                    // Bitmask conversions for canvas compatibility
                    imgData.data[outIdx]     = ((val >> 11) & 0x1F) << 3; // R
                    imgData.data[outIdx + 1] = ((val >> 5) & 0x3F) << 2;  // G
                    imgData.data[outIdx + 2] = (val & 0x1F) << 3;         // B
                    imgData.data[outIdx + 3] = 255;                       // Alpha force channel
                    outIdx += 4;
                }
            } else if (bytesPerPixel === 4) {
                // Handling 32-bit XRGB or BGRX structures cleanly
                for (let i = 0; i < totalBytes; i += 4) {
                    imgData.data[outIdx]     = uint8View[i + 2]; // R
                    imgData.data[outIdx + 1] = uint8View[i + 1]; // G
                    imgData.data[outIdx + 2] = uint8View[i];     // B
                    imgData.data[outIdx + 3] = 255;               // Alpha
                    outIdx += 4;
                }
            }

            // Blit frame directly onto the display layout
            ctx.putImageData(imgData, 0, 0);
        };
    }

    // 7. CONTROL SCHEME: Injecting input packets down the WebRTC data channel
    function sendInput(buttonId, isPressed) {
        if (!dataChannel || dataChannel.readyState !== 'open') return;

        // Structure matches the backend hook expected parameters: [PlayerPort, ButtonID, State]
        const payload = new Uint8Array([1, buttonId, isPressed ? 1 : 0]);
        dataChannel.send(payload);
    }

    window.addEventListener('keydown', (e) => {
        if (keyMap[e.key] !== undefined) {
            e.preventDefault();
            sendInput(keyMap[e.key], true);
        }
    });

    window.addEventListener('keyup', (e) => {
        if (keyMap[e.key] !== undefined) {
            e.preventDefault();
            sendInput(keyMap[e.key], false);
        }
    });

    // Auto-fire connection sequencing on script execution block load
    initializeWebRTC();
</script>
